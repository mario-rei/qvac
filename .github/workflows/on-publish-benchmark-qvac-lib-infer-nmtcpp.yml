name: Benchmark on Publish (NMTCPP)

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Addon version to benchmark (leave empty to use package.json version)'
        required: false
        type: string
  workflow_call:
    inputs:
      version:
        description: 'Addon version to benchmark'
        required: false
        type: string

env:
  PKG_DIR: packages/qvac-lib-infer-nmtcpp

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      opus_pairs: ${{ steps.read-opus.outputs.pairs }}
      bergamot_pairs: ${{ steps.read-bergamot.outputs.pairs }}
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get addon version
        id: get-version
        working-directory: ${{ env.PKG_DIR }}
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            version="${{ inputs.version }}"
          else
            version=$(node -p "require('./package.json').version")
          fi
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "📦 Benchmarking addon version: $version"

      - name: Read released OPUS models
        id: read-opus
        working-directory: ${{ env.PKG_DIR }}
        run: |
          if [ ! -f .github/released-models-opus.txt ]; then
            echo "ERROR: .github/released-models-opus.txt not found in ${{ env.PKG_DIR }}"
            exit 1
          fi
          pairs=$(grep -v '^#' .github/released-models-opus.txt | grep -v '^[[:space:]]*$' | tr '\n' ',' | sed 's/,$//')
          if [ -z "$pairs" ]; then
            echo "ERROR: No language pairs found in .github/released-models-opus.txt"
            exit 1
          fi
          echo "pairs=$pairs" >> $GITHUB_OUTPUT
          echo "🎯 Released OPUS pairs: $pairs"

      - name: Read released Bergamot models
        id: read-bergamot
        working-directory: ${{ env.PKG_DIR }}
        run: |
          if [ ! -f .github/released-models-bergamot.txt ]; then
            echo "ERROR: .github/released-models-bergamot.txt not found in ${{ env.PKG_DIR }}"
            exit 1
          fi
          pairs=$(grep -v '^#' .github/released-models-bergamot.txt | grep -v '^[[:space:]]*$' | tr '\n' ',' | sed 's/,$//')
          if [ -z "$pairs" ]; then
            echo "ERROR: No language pairs found in .github/released-models-bergamot.txt"
            exit 1
          fi
          echo "pairs=$pairs" >> $GITHUB_OUTPUT
          echo "🎯 Released Bergamot pairs: $pairs"

  benchmark-qvac:
    needs: prepare
    uses: ./.github/workflows/benchmark-qvac-lib-infer-nmtcpp.yml
    secrets: inherit
    with:
      pairs: ${{ needs.prepare.outputs.opus_pairs }}
      translators: 'qvac'
      dataset_flores_devtest: true
      dataset_conversational_phrases: true
      metric_chrfpp: true
      metric_comet: true
      use_pivot: false
      is_quantized_model: false
      hyperparams: 'fast'

  benchmark-bergamot:
    needs: prepare
    uses: ./.github/workflows/benchmark-qvac-lib-infer-nmtcpp.yml
    secrets: inherit
    with:
      pairs: ${{ needs.prepare.outputs.bergamot_pairs }}
      translators: 'qvac_bergamot'
      dataset_flores_devtest: true
      dataset_conversational_phrases: true
      metric_chrfpp: true
      metric_comet: true
      use_pivot: false
      is_quantized_model: false
      hyperparams: 'fast'

  summary:
    needs: [prepare, benchmark-qvac, benchmark-bergamot]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Display benchmark summary
        run: |
          echo "✅ Automated benchmark completed"
          echo ""
          echo "📦 Addon Version: ${{ needs.prepare.outputs.version }}"
          echo "📊 Datasets: flores-devtest, conversational-phrases"
          echo "📈 Metrics: chrF++, COMET"
          echo ""
          echo "### 🔧 OPUS/GGML (qvac)"
          echo "🎯 Pairs: ${{ needs.prepare.outputs.opus_pairs }}"
          echo ""
          echo "📍 S3 Model Paths:"
          IFS=',' read -ra PAIRS <<< "${{ needs.prepare.outputs.opus_pairs }}"
          for pair in "${PAIRS[@]}"; do
            pair=$(echo "$pair" | xargs)
            echo "- **$pair**: \`s3://tether-ai-dev/qvac_models_compiled/ggml/marian/q0f16/ggml-opus-$pair/\`"
          done
          echo ""
          echo "### 🔧 Bergamot (qvac_bergamot)"
          echo "🎯 Pairs: ${{ needs.prepare.outputs.bergamot_pairs }}"
          echo ""
          echo "📍 S3 Model Paths:"
          IFS=',' read -ra PAIRS <<< "${{ needs.prepare.outputs.bergamot_pairs }}"
          for pair in "${PAIRS[@]}"; do
            pair=$(echo "$pair" | xargs)
            pair_code=$(echo "$pair" | tr -d '-')
            echo "- **$pair**: \`s3://tether-ai-dev/qvac_models_compiled/bergamot/bergamot-$pair_code/\`"
          done
          echo ""
          echo "🔗 View results in the benchmark workflow artifacts"
